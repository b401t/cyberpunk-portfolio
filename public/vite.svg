<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="16" fill="#0a0a0f"/>
  <text x="50" y="62" text-anchor="middle" font-family="monospace" font-size="40" font-weight="bold" fill="#00f0ff" filter="url(#glow)">{ }</text>
  <text x="50" y="38" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#ff00aa" filter="url(#glow)">&lt;/&gt;</text>
</svg>
